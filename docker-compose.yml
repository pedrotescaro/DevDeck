version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: devdeck-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_devdeck_2024}
      POSTGRES_DB: devdeck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devdeck-web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres_devdeck_2024}@db:5432/devdeck?schema=public
      DIRECT_URL: postgresql://postgres:${DB_PASSWORD:-postgres_devdeck_2024}@db:5432/devdeck?schema=public
    depends_on:
      - db

volumes:
  postgres_data:
