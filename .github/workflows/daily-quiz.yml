name: Daily Quiz Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Call generate-daily endpoint
        run: |
          curl -X POST "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/admin/quiz/generate-daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
